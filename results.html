<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Election Results</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,wght@0,400;0,500;0,600;1,500&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <header class="site-header">
    <svg class="goniometer" viewBox="0 0 140 140" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
      <path d="M20 120 A 100 100 0 0 1 120 20" stroke="currentColor" stroke-width="1.5"/>
      <path d="M20 120 L 120 120 L 120 20" stroke="currentColor" stroke-width="1" stroke-dasharray="3 4" opacity="0.6"/>
      <circle cx="20" cy="120" r="2.5" fill="currentColor"/>
    </svg>
    <div class="brand">
      <img id="brand-logo" class="brand-logo" src="assets/logo-placeholder.png" alt="" onerror="this.style.visibility='hidden'">
      <div class="brand-text">
        <span id="brand-name" class="brand-name">Association Elections</span>
        <span class="brand-tag">Student Portal</span>
      </div>
    </div>
    <nav class="site-nav">
      <a href="vote.html">Vote</a>
      <a href="results.html" class="active">Results</a>
      <button id="logout-btn" class="btn-logout">Log out</button>
    </nav>
  </header>

  <main class="top-aligned">
    <div class="page-width" style="max-width: 640px;">

      <div class="card-header" style="text-align:left; margin-bottom: 1.5rem;">
        <span class="eyebrow">Live Tally</span>
        <h1>Election Results</h1>
      </div>

      <div id="results-message"></div>
      <div id="results-chart-container"></div>

    </div>
  </main>

  <footer class="site-footer">
    <span id="brand-footer">Association Elections</span> · Voting Portal
  </footer>

  <script type="module" src="js/results.js"></script>
</body>
</html>
